name: erasica
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.0
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  meta: ^1.16.0
  auto_route: ^11.1.0
  easy_localization: ^3.0.8
  google_fonts: ^7.0.1
  theme_code_gen_annotations: ^0.1.1
  liquid_glass_renderer: ^0.2.0-dev.4
  photo_manager: ^3.8.3
  permission_handler: ^12.0.1
  uuid: ^4.5.2
  flutter_xlider: ^3.5.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  ios_color_picker: ^2.0.2
  sqflite: ^2.4.2
  path: ^1.9.1
  injectable: ^2.7.1+4
  shared_preferences: ^2.5.4
  image: ^4.7.2
  image_editor: ^1.6.0
  in_app_review: ^2.0.11
  url_launcher: ^6.3.2
  adapty_flutter: ^3.15.3
  equatable: ^2.0.8
  flutter_svg: ^2.2.3
  auto_size_text: ^3.0.0
  toastification: ^3.0.3
  gradient_borders: ^1.0.2
  carousel_slider: ^5.1.1
  adaptive_platform_ui: ^0.1.101
  app_tracking_transparency: ^2.0.6+1
  lottie_native: ^0.1.4
  quick_actions: ^1.1.0
  share_plus: ^12.0.1
  lottie: ^3.3.2
  dio: ^5.9.1
  crypto: ^3.0.7
  responsive_framework: ^1.5.1
  cached_network_image: ^3.4.1
  screen_protector: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  theme_code_gen: ^1.1.0
  auto_route_generator: ^10.4.0
  build_runner: ^2.4.13
  injectable_generator: ^2.9.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_icon.jpg"

flutter_native_splash:
  background_image: "assets/images/splash.png"
  image: "assets/images/splash_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/animations/
    - assets/images/
    - assets/images/page_bg/
    - assets/images/buttons/
    - assets/images/icons/
    - assets/images/bg_layers/
    - assets/images/onboarding/
    - assets/images/paywall/
