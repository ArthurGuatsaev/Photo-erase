analyzer:
  strong-mode:
    implicit-casts: false         # Явное указание на запрет неявных преобразований типов
    implicit-dynamic: false       # Запрет неявного использования dynamic

  errors:
    # ❌ Отключаем лишние стандартные предупреждения, чтобы не мешали в CI
    deprecated_member_use: ignore             # Использование устаревших API
    must_be_immutable: ignore                 # Класс должен быть immutable (для Flutter widgets)
    must_call_super: ignore                   # Метод родителя должен быть вызван
    invalid_annotation_target: ignore         # Неправильное использование аннотаций

    # ✅ Ошибки, которые мы хотим отслеживать в CI
    unused_import: error                      # Неиспользуемые импорты
    unused_local_variable: error              # Неиспользуемые локальные переменные
    unused_element: error                     # Неиспользуемые методы/переменные
    unused_field: error                       # Неиспользуемые поля класса
    dead_code: error                          # Недостижимый код (например, после return)

    camel_case_types: error                   # Названия классов/типов должны быть в camelCase
    camel_case_extensions: error              # Названия extensions — тоже в camelCase
    non_constant_identifier_names: error      # Названия переменных должны быть в правильном стиле
    library_prefixes: error                   # Префиксы импортов должны быть в правильном стиле
    file_names: error                         # Имена файлов должны быть в snake_case

    prefer_const_constructors: error          # ⚙️ Подсказка использовать const конструкторы, если возможно
    prefer_final_locals: error                # ✅ Локальные переменные, которые не изменяются, должны быть final
    unnecessary_this: error                   # 🔍 Убираем лишние this., если это не влияет на смысл

linter:
  rules:
    # 📛 Линтинг по правилам именования — нужен для читаемости и консистентности
    camel_case_types: true
    camel_case_extensions: true
    non_constant_identifier_names: true
    library_prefixes: true
    file_names: true

    # 🔒 Строгие правила для качества кода
    prefer_const_constructors: true           # const конструкторы ускоряют отрисовку Flutter UI
    prefer_final_locals: true                 # Использовать final, если переменная не переопределяется
    unnecessary_this: true                    # Избавляемся от лишнего this, если это не обязательно
